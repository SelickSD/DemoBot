name: Deploy to Production

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/demobot:latest
            ${{ secrets.DOCKER_USERNAME }}/demobot:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e  # Выходим при первой ошибке
            
            echo "🚀 Deploying version ${{ github.sha }} to production..."
            
            # Авторизация в Docker
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Останавливаем старый контейнер
            echo "🛑 Останавливаем старый контейнер..."
            docker stop demobot 2>/dev/null || true
            docker rm demobot 2>/dev/null || true
            
            # Забираем новую версию
            echo "📥 Загружаем новый образ..."
            docker pull "${{ secrets.DOCKER_USERNAME }}"/demobot:latest
            
            # Проверяем подключение к Postgres
            echo "🔍 Проверяем подключение к Postgres..."
            if docker run --rm \
              postgres:15-alpine \
              sh -c "PGPASSWORD='${{ secrets.DB_PASSWORD }}' psql -h '${{ secrets.DB_HOST }}' -p '${{ secrets.DB_PORT }}' -U '${{ secrets.DB_USER }}' -d '${{ secrets.DB_NAME }}' -c '\q' 2>/dev/null"; then
              echo "✅ Подключение к Postgres успешно"
            else
              echo "❌ Ошибка подключения к Postgres"
              echo "Host: ${{ secrets.DB_HOST }}:{{ secrets.DB_PORT }}"
              echo "DB: ${{ secrets.DB_NAME }}"
              exit 1
            fi
            
            # Создаем файл с переменными окружения
            echo "📝 Настраиваем переменные окружения..."
            cat > /tmp/demobot.env << EOF
            BOT_TOKEN=${{ secrets.BOT_TOKEN }}
            AI_API_KEY=${{ secrets.AI_API_KEY }}
            DEBUG=false
            CONFIG_EMAIL=${{ secrets.CONFIG_EMAIL }}
            BOT_NAME=${{ secrets.BOT_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            EOF
            
            # Запускаем новый контейнер
            echo "▶️ Запускаем новый контейнер..."
            docker run -d \
              --name demobot \
              --restart unless-stopped \
              --env-file /tmp/demobot.env \
              "${{ secrets.DOCKER_USERNAME }}"/demobot:latest
            
            # Очищаем временный файл
            rm -f /tmp/demobot.env
            
            # Ждем и проверяем
            echo "⏳ Ждем запуска контейнера..."
            sleep 15
            
            if docker ps | grep -q demobot; then
              echo "✅ Production deployment completed!"
              echo "📊 Статус контейнера:"
              docker ps -f name=demobot --format "table {{.ID}}\t{{.Names}}\t{{.Status}}\t{{.Ports}}"
            else
              echo "❌ Контейнер не запустился"
              docker logs demobot --tail 50 || true
              exit 1
            fi