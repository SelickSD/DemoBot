name: Deploy to Production

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/demobot:latest
            ${{ secrets.DOCKER_USERNAME }}/demobot:${{ github.sha }}

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            
            echo "🚀 Deploying version ${{ github.sha }} to production..."
            
            # Авторизация в Docker
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            
            # Останавливаем старый контейнер
            docker stop demobot 2>/dev/null || true
            docker rm demobot 2>/dev/null || true
            
            # Забираем новую версию
            docker pull "${{ secrets.DOCKER_USERNAME }}"/demobot:latest
            
            # Проверяем и запускаем PostgreSQL если нужно
            if ! systemctl is-active --quiet postgresql; then
              echo "🔧 Запускаем PostgreSQL..."
              systemctl start postgresql
              sleep 2
            fi
            
            # Запускаем контейнер в сети хоста (самый простой способ)
            echo "▶️ Запускаем контейнер в сети хоста..."
            docker run -d \
              --name demobot \
              --network host \
              --restart unless-stopped \
              -e BOT_TOKEN="${{ secrets.BOT_TOKEN }}" \
              -e AI_API_KEY="${{ secrets.AI_API_KEY }}" \
              -e DEBUG="false" \
              -e CONFIG_EMAIL="${{ secrets.CONFIG_EMAIL }}" \
              -e BOT_NAME="${{ secrets.BOT_NAME }}" \
              -e DB_USER="${{ secrets.DB_USER }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e DB_HOST="localhost" \
              -e DB_PORT="${{ secrets.DB_PORT }}" \
              -e DB_NAME="${{ secrets.DB_NAME }}" \
              "${{ secrets.DOCKER_USERNAME }}"/demobot:latest
            
            # Ждем и проверяем
            sleep 15
            
            if docker ps | grep -q demobot; then
              echo "✅ Контейнер успешно запущен!"
            
              # Быстрая проверка логов
              echo "📋 Проверяем логи..."
              if ! docker logs demobot --tail 5 2>&1 | grep -i "error\|fail\|panic" > /dev/null; then
                echo "✅ Ошибок в логах не обнаружено"
                echo "🎉 Деплой успешно завершен!"
              else
                echo "⚠️  В логах есть ошибки:"
                docker logs demobot --tail 20
              fi
            else
              echo "❌ Контейнер не запустился"
              docker logs demobot --tail 30 2>/dev/null || echo "Логи недоступны"
              exit 1
            fi