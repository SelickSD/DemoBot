name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/demobot:latest
            ${{ secrets.DOCKER_USERNAME }}/demobot:${{ github.sha }}

      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Sync deployment files
        run: |
          rsync -avz \
            docker-compose.yml \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/home/${{ secrets.SERVER_USER }}/apps/demobot/

      - name: Deploy
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
          set -e

          cd ~/apps/demobot

          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login \
            -u "${{ secrets.DOCKER_USERNAME }}" \
            --password-stdin

          rm -f .env
          
          {
            echo "DOCKER_IMAGE=${{ secrets.DOCKER_USERNAME }}/demobot:latest"
            echo
            echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}"
            echo "AI_API_KEY=${{ secrets.AI_API_KEY }}"
            echo "CONFIG_EMAIL=${{ secrets.CONFIG_EMAIL }}"
            echo "BOT_NAME=${{ secrets.BOT_NAME }}"
            echo "DEBUG=false"
            echo
            echo "DB_NAME=${{ secrets.DB_NAME }}"
            echo "DB_USER=${{ secrets.DB_USER }}"
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
          } > .env
          
          echo "===== .env ====="
          ls -l .env
          wc -l .env
          echo "================"

          docker compose --env-file .env pull
          docker compose --env-file .env up -d --remove-orphans

          docker image prune -f

          echo "Waiting for startup..."
          sleep 15

          echo
          echo "====== CONTAINERS ======"
          docker compose --env-file .env ps -q bot

          BOT_ID=$(docker compose ps -q bot)

          if [ -z "$BOT_ID" ]; then
            echo "Bot container not found"
            exit 1
          fi

          if [ "$(docker inspect -f '{{.State.Running}}' "$BOT_ID")" != "true" ]; then
            echo "Bot container is not running"

            echo
            echo "====== POSTGRES LOGS ======"
            docker compose logs postgres --tail=50

            echo
            echo "====== BOT LOGS ======"
            docker compose logs bot --tail=50

            exit 1
          fi

          echo
          echo "====== BOT LOGS ======"
          docker compose logs bot --tail=50
          EOF