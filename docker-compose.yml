services:
  postgres:
    image: postgres:17
    container_name: demobot-postgres

    restart: unless-stopped

    ports:
      - "127.0.0.1:5432:5432"

    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    image: ${DOCKER_IMAGE}
    container_name: demobot

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      AI_API_KEY: ${AI_API_KEY}
      CONFIG_EMAIL: ${CONFIG_EMAIL}
      BOT_NAME: ${BOT_NAME}
      DEBUG: ${DEBUG}

      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data: